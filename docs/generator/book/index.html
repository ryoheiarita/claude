<!DOCTYPE html>
<html lang="ja">
<head>
<script src="../../gate.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book UI 画像入れ替えジェネレーター</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  [hidden] { display:none !important; }
  html,body { height:100%; }
  body {
    background:#0a0a0c; color:#e8e8ea;
    font-family:'Figtree','Hiragino Sans','Noto Sans JP',sans-serif;
    display:flex; flex-direction:column; overflow:hidden;
  }

  /* ---------- app chrome ---------- */
  header {
    display:flex; align-items:center; gap:20px;
    padding:12px 20px; border-bottom:1px solid #232328; flex-shrink:0;
  }
  header h1 { font-size:14px; font-weight:600; color:#fff; letter-spacing:.02em; }
  .tabs { display:flex; background:#1a1a1f; border-radius:10px; padding:3px; gap:2px; }
  .tabs button {
    border:0; background:transparent; color:#9a9aa2; font:inherit; font-size:12px; font-weight:600;
    padding:7px 16px; border-radius:8px; cursor:pointer; transition:.15s;
  }
  .tabs button.active { background:#3d3df5; color:#fff; }
  .spacer { flex:1; }
  .export-group { display:flex; align-items:center; gap:8px; }
  select, input[type="text"], textarea {
    background:#1a1a1f; border:1px solid #2c2c33; color:#e8e8ea; font:inherit; font-size:12px;
    border-radius:8px; padding:7px 10px; outline:none;
  }
  select:focus, textarea:focus { border-color:#3d3df5; }
  .btn {
    border:0; background:#2a2a31; color:#fff; font:inherit; font-size:12px; font-weight:600;
    padding:8px 16px; border-radius:8px; cursor:pointer; transition:.15s;
  }
  .btn:hover { background:#34343c; }
  .btn.primary { background:#3d3df5; }
  .btn.primary:hover { background:#5050ff; }

  main { flex:1; display:flex; min-height:0; }

  /* ---------- stage ---------- */
  #stage {
    flex:1; display:flex; align-items:center; justify-content:center;
    overflow:auto; padding:20px; min-width:0;
  }
  #phoneScaler { flex-shrink:0; }
  #phone {
    width:390px; height:844px; background:#101010; position:relative;
    overflow:hidden; border-radius:24px; box-shadow:0 0 0 1px #2a2a30, 0 24px 80px rgba(0,0,0,.6);
    transform-origin:top left;
  }
  #phone, #phone * { user-select:none; -webkit-user-select:none; }

  /* ---------- book ---------- */
  .cell-title {
    position:absolute; width:140px; display:flex; flex-direction:column; justify-content:center;
    font-size:12px; line-height:16px; font-weight:500; color:#fff; overflow:hidden;
  }
  .cell-title p {
    display:-webkit-box; -webkit-box-orient:vertical; -webkit-line-clamp:2;
    overflow:hidden; word-break:break-word;
  }
  .cell-title.oneline p { display:block; white-space:nowrap; text-overflow:ellipsis; }
  .cell-title.dim { color:rgba(255,255,255,.5); }

  .book {
    position:absolute; width:140px; height:198px;
    border-radius:1px 6px 6px 1px; overflow:hidden;
    box-shadow:0 2px 3px rgba(16,16,16,.3);
    background:#1b1b1b; cursor:grab; touch-action:none;
  }
  .book.dragging { cursor:grabbing; }
  .book.dim { opacity:.5; }
  .book.selected::after {
    content:''; position:absolute; inset:0; border:2px solid #3d3df5; border-radius:inherit;
    pointer-events:none; z-index:20;
  }
  .book .cropclip { position:absolute; overflow:hidden; pointer-events:none; }
  .book .cover { position:absolute; max-width:none; pointer-events:none; }
  .book .ph {
    position:absolute; inset:0; display:flex; flex-direction:column; gap:6px;
    align-items:center; justify-content:center; color:rgba(255,255,255,.4);
    font-size:11px; border:1px dashed rgba(255,255,255,.22); border-radius:inherit;
  }
  .book .ph svg { opacity:.6; }
  .book .ov { position:absolute; inset:0; pointer-events:none; }
  .ov-reflection { background:linear-gradient(144.79deg, rgba(255,255,255,.25) 0%, rgba(16,16,16,0) 100%); }
  .ov-paper { mix-blend-mode:multiply; }
  .ov-paper img { width:100%; height:100%; object-fit:cover; display:block; }
  .ov-highlight { left:6px; width:4px; top:0; bottom:0; inset:auto; position:absolute; height:100%; }
  .ov-highlight img { width:100%; height:100%; object-fit:cover; display:block; }
  .ov-spineline { position:absolute; left:0; top:0; width:1.5px; height:100%; background:rgba(16,16,16,.5); mix-blend-mode:multiply; }
  .ov-spinevec { position:absolute; left:7.5px; top:-2px; width:5px; height:202px; }
  .ov-inset { box-shadow:inset 0 -4px 8px rgba(16,16,16,.2), inset 0 1px 1px rgba(255,255,255,.4); border-radius:inherit; }
  .badge {
    position:absolute; left:0; bottom:8px; padding:4px 12px 4px 10px;
    border-radius:0 16px 16px 0; font-size:12px; font-weight:600; color:#fff;
    background:linear-gradient(168deg, rgb(129,45,255) 0%, rgb(255,103,57) 100%);
    z-index:10; pointer-events:none; white-space:nowrap;
  }
  .badge.coming { background:rgba(0,0,0,.65); backdrop-filter:blur(8px); color:rgba(255,255,255,.5); }

  .shelf { position:absolute; pointer-events:none; }
  .shelf img { width:100%; height:100%; display:block; }

  /* ---------- phone chrome ---------- */
  .nav-grad { position:absolute; left:0; top:0; width:100%; height:112px; pointer-events:none; z-index:5;
    background:linear-gradient(to bottom, rgba(0,0,0,.58), rgba(0,0,0,0)); }
  .st-time { position:absolute; top:11px; left:16px; width:116px; height:22px; z-index:6;
    display:flex; align-items:center; justify-content:center; padding-top:2px;
    font-family:-apple-system,'SF Pro',sans-serif; font-weight:600; font-size:17px; color:#fff; }
  .st-levels { position:absolute; top:12px; left:257px; width:117px; height:22px; z-index:6;
    display:flex; align-items:center; justify-content:center; gap:7px; padding-top:1px; }
  .toolbar-ic { position:absolute; top:60px; width:48px; height:48px; border-radius:999px; z-index:6;
    display:flex; align-items:center; justify-content:center; }
  .toolbar-ic.on { left:135px; background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.15); }
  .toolbar-ic.off { left:207px; border:1px solid rgba(255,255,255,.08); }
  .toolbar-ic img { width:24px; height:24px; }
  .toolbar-ic.off img { opacity:.5; }

  .tabbar { position:absolute; left:31px; top:756px; width:328px; height:64px; z-index:8;
    background:rgba(0,0,0,.65); backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,.15); border-radius:42px; }
  .tb-item { position:absolute; width:48px; text-align:center; }
  .tb-item img.ic { width:24px; height:24px; display:block; margin:0 auto; }
  .tb-item .lb { font-size:11px; line-height:15px; font-weight:400; color:rgba(255,255,255,.5);
    letter-spacing:.01em; text-shadow:0 0 4px rgba(0,0,0,.25); margin-top:4px; }
  .tb-center { position:absolute; }
  .tb-center .circ { width:48px; height:48px; border-radius:50%; background:#fff;
    display:flex; align-items:center; justify-content:center; }
  .tb-center .circ img { width:22px; height:22px; }
  .tb-dot { position:absolute; width:12px; height:12px; z-index:9; }
  .home-ind { position:absolute; left:128px; top:831px; width:134px; height:5px;
    border-radius:100px; background:#fff; z-index:9; }

  /* ---------- panel ---------- */
  aside {
    width:280px; flex-shrink:0; border-left:1px solid #232328; padding:18px 18px 24px;
    overflow-y:auto; display:flex; flex-direction:column; gap:18px;
  }
  .sec { display:flex; flex-direction:column; gap:8px; }
  .sec label { font-size:11px; font-weight:600; color:#8a8a92; letter-spacing:.06em; text-transform:uppercase; }
  .sel-chip { font-size:12px; color:#fff; background:#1a1a1f; border:1px solid #2c2c33;
    border-radius:8px; padding:8px 10px; }
  .hint { font-size:11px; color:#6e6e76; line-height:1.6; }
  input[type=range] { width:100%; accent-color:#3d3df5; }
  .row2 { display:flex; gap:8px; align-items:center; }
  .row2 .btn { flex-shrink:0; }
  .zoomval { font-size:11px; color:#9a9aa2; width:38px; text-align:right; }
  textarea { resize:vertical; min-height:52px; width:100%; line-height:1.5; }
  aside select { width:100%; }
  .posin { width:70px; padding:6px 8px; }
  .poslb { font-size:11px; color:#8a8a92; }
  input[type=checkbox] { accent-color:#3d3df5; width:16px; height:16px; }
</style>
</head>
<body>
<header>
  <h1>Book UI ジェネレーター</h1>
  <div class="tabs">
    <button id="tabSingle" class="active">Book 1つ</button>
    <button id="tabGrid">Book 6つ（UI）</button>
  </div>
  <div class="spacer"></div>
  <div class="export-group">
    <select id="exTarget">
      <option value="image" selected>選択中の画像のみ</option>
      <option value="ui">画面全体（UI）</option>
    </select>
    <select id="exScale">
      <option value="1">×1</option>
      <option value="2">×2</option>
      <option value="3" selected>×3</option>
    </select>
    <button class="btn primary" id="exportBtn">PNG 書き出し</button>
  </div>
</header>
<main>
  <div id="stage"><div id="phoneScaler"><div id="phone"></div></div></div>
  <aside>
    <div class="sec">
      <label>選択中</label>
      <div class="sel-chip" id="selInfo">—</div>
      <div class="hint">ブックをクリックで選択。ドラッグで位置調整、マウスホイールでズームできます。</div>
    </div>
    <div class="sec">
      <label>画像</label>
      <button class="btn" id="pickBtn">画像を選択…</button>
      <div class="hint">ブックに画像ファイルをドロップしても差し替えられます。</div>
    </div>
    <div class="sec">
      <label>クロップ</label>
      <div class="row2" style="justify-content:space-between">
        <span style="font-size:12px">自由配置（余白を許可）</span>
        <input type="checkbox" id="freeChk">
      </div>
      <div class="row2">
        <input type="range" id="zoomSlider" min="1" max="4" step="0.01" value="1">
        <span class="zoomval" id="zoomVal">100%</span>
      </div>
      <div class="row2">
        <span class="poslb">X</span><input type="number" id="posX" step="1" class="posin">
        <span class="poslb">Y</span><input type="number" id="posY" step="1" class="posin">
        <span class="poslb">px</span>
      </div>
      <label style="margin-top:6px">切り落とし（上下左右 %）</label>
      <div class="row2">
        <span class="poslb">上</span><input type="number" id="trimT" min="0" max="90" step="1" value="0" class="posin trimin">
        <span class="poslb">下</span><input type="number" id="trimB" min="0" max="90" step="1" value="0" class="posin trimin">
      </div>
      <div class="row2">
        <span class="poslb">左</span><input type="number" id="trimL" min="0" max="90" step="1" value="0" class="posin trimin">
        <span class="poslb">右</span><input type="number" id="trimR" min="0" max="90" step="1" value="0" class="posin trimin">
      </div>
      <button class="btn" id="resetBtn">位置をリセット</button>
      <div class="hint">通常は余白が出ない範囲に制限されます。自由配置をONにすると縮小（20%〜）や枠外への移動も可能です。X/Yは画像左上の枠内座標です。</div>
    </div>
    <div class="sec">
      <label>タイトル</label>
      <textarea id="titleInput" rows="2"></textarea>
    </div>
    <div class="sec">
      <label>バッジ</label>
      <select id="badgeSel">
        <option value="">なし</option>
        <option value="NEW">NEW</option>
        <option value="UPDATE">UPDATE</option>
        <option value="COMING SOON">COMING SOON（暗転表示）</option>
      </select>
    </div>
  </aside>
</main>
<input type="file" id="fileInput" accept="image/*" hidden>

<script>
'use strict';
/* ================= layout constants (Figma: アルバム/アルバムビュー 390×844) ================= */
const W = 390, H = 844, BW = 140, BH = 198;
const LAYOUTS = {
  grid: {
    columns: [
      { y: 144, titleH: 32, cells: [{ x: 35, slot: 0 }, { x: 195, slot: 1 }], shelf: 'shelf1' },
      { y: 446, titleH: 32, cells: [{ x: 35, slot: 2 }, { x: 195, slot: 3 }], shelf: 'shelf2' },
      { y: 748, titleH: 16, cells: [{ x: 35, slot: 4 }, { x: 195, slot: 5 }], shelf: 'shelf2' },
    ],
  },
  single: {
    columns: [
      { y: 360, titleH: 32, cells: [{ x: 115, slot: 6 }], shelf: 'shelf1' },
    ],
  },
};
// book pos in column: bx = cell.x+10, by = colY+titleH+8 ; shelf top = by+BH-12, svg drawn at (-20, top-16, 430,116)

/* ================= state ================= */
const slots = [
  { title: 'CLOUD NINE presents “Zipangu” JAPANESE MUSIC EVENT 2026', badge: 'NEW', src: 'assets/sample1.png' },
  { title: 'COUNTDOWN JAPAN 25/26', badge: 'UPDATE', src: 'assets/sample2.png' },
  { title: 'MUSIC EXPO LIVE 2025', badge: 'COMING SOON', src: 'assets/sample3.png' },
  { title: 'ドリームフェスティバル 2025', badge: '', src: 'assets/sample4.png' },
  { title: 'Spotify On Stage Tokyo 2025', badge: 'NEW', src: 'assets/sample5.png' },
  { title: 'JAPAN JAM 2025', badge: 'NEW', src: 'assets/sample6.png' },
  { title: 'CLOUD NINE presents “Zipangu” JAPANESE MUSIC EVENT 2026', badge: 'NEW', src: 'assets/sample1.png' },
].map(s => ({ ...s, img: null, zoom: 1, ox: 0, oy: 0, free: false, trim: { t: 0, r: 0, b: 0, l: 0 } }));

let mode = 'single';
let selected = 6;
const slotEls = {}; // slot -> {book, cropImg, ph, badge, title}

/* ================= assets ================= */
const ASSET_SRC = {
  paper: 'assets/paper_texture.png', highlight: 'assets/highlight.png', spine: 'assets/spine_vector.svg',
  shelf1: 'assets/shelf1.svg', shelf2: 'assets/shelf2.svg',
  cellular: 'assets/cellular.svg', wifi: 'assets/wifi.svg', battery: 'assets/battery.svg',
  icHome: 'assets/icon_home.svg', icTalk: 'assets/icon_talk.svg', icImages: 'assets/icon_images.svg',
  icShop: 'assets/icon_shop.svg', icMypage: 'assets/icon_mypage.svg',
  icBook: 'assets/icon_book.svg', icImage: 'assets/icon_image.svg', dot: 'assets/badge_dot.svg',
};
const A = {}; // name -> {img, url}

function loadAsset(name, src) {
  return fetch(src).then(r => {
    if (src.endsWith('.svg')) {
      return r.text().then(txt => {
        // SVGs from Figma use width="100%" — give them intrinsic size so canvas drawImage works
        const vb = txt.match(/viewBox="([\d.\s-]+)"/);
        if (vb) {
          const [, , vw, vh] = vb[1].trim().split(/\s+/).map(Number);
          txt = txt.replace(/width="100%"/, `width="${vw}"`).replace(/height="100%"/, `height="${vh}"`);
        }
        const url = URL.createObjectURL(new Blob([txt], { type: 'image/svg+xml' }));
        return loadImg(url).then(img => { A[name] = { img, url }; });
      });
    }
    return r.blob().then(b => {
      const url = URL.createObjectURL(b);
      return loadImg(url).then(img => { A[name] = { img, url }; });
    });
  });
}
function loadImg(url) {
  return new Promise((res, rej) => {
    const im = new Image();
    im.onload = () => res(im);
    im.onerror = rej;
    im.src = url;
  });
}

/* ================= crop math ================= */
function minZoom(s) { return s.free ? 0.2 : 1; }
function srcRect(s) { // source-image region left after edge trimming (%)
  const iw = s.img.naturalWidth, ih = s.img.naturalHeight, t = s.trim;
  return {
    sx: iw * t.l / 100, sy: ih * t.t / 100,
    sw: iw * (100 - t.l - t.r) / 100, sh: ih * (100 - t.t - t.b) / 100,
  };
}
function cropRect(s) {
  const { sw, sh } = srcRect(s);
  const base = Math.max(BW / sw, BH / sh);
  const sc = base * s.zoom;
  const dw = sw * sc, dh = sh * sc;
  let x = (BW - dw) / 2 + s.ox, y = (BH - dh) / 2 + s.oy;
  if (!s.free) { // keep the frame fully covered (no gaps)
    x = Math.min(0, Math.max(BW - dw, x));
    y = Math.min(0, Math.max(BH - dh, y));
  }
  return { dw, dh, x, y, sc };
}
function setPanPx(s, nx, ny) {
  const { dw, dh } = cropRect(s);
  s.ox = nx - (BW - dw) / 2;
  s.oy = ny - (BH - dh) / 2;
  if (!s.free) { // store the clamped value so toggling modes stays predictable
    const r = cropRect(s);
    s.ox = r.x - (BW - dw) / 2;
    s.oy = r.y - (BH - dh) / 2;
  }
}

/* ================= DOM build ================= */
const phone = document.getElementById('phone');

function render() {
  phone.innerHTML = '';
  for (const k in slotEls) delete slotEls[k];
  const L = LAYOUTS[mode];

  for (const col of L.columns) {
    const by = col.y + col.titleH + 8;
    // shelf (z under books)
    const shelfTop = by + BH - 12;
    const sh = document.createElement('div');
    sh.className = 'shelf';
    sh.style.cssText = `left:-20px;top:${shelfTop - 16}px;width:430px;height:116px;z-index:1;`;
    sh.innerHTML = `<img src="${A[col.shelf].url}" alt="">`;
    phone.appendChild(sh);

    for (const cell of col.cells) {
      const s = slots[cell.slot];
      const dim = s.badge === 'COMING SOON';
      // title
      const t = document.createElement('div');
      t.className = 'cell-title' + (col.titleH === 16 ? ' oneline' : '') + (dim ? ' dim' : '');
      t.style.cssText = `left:${cell.x + 10}px;top:${col.y}px;height:${col.titleH}px;z-index:2;`;
      t.innerHTML = '<p></p>';
      t.querySelector('p').textContent = s.title;
      phone.appendChild(t);
      // book
      const b = document.createElement('div');
      b.className = 'book' + (dim ? ' dim' : '') + (cell.slot === selected ? ' selected' : '');
      b.style.cssText = `left:${cell.x + 10}px;top:${by}px;z-index:2;`;
      b.dataset.slot = cell.slot;
      b.innerHTML = `
        <div class="cropclip"><img class="cover" alt=""></div>
        <div class="ph" hidden>
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
          <span>画像を選択</span>
        </div>
        <div class="ov ov-reflection"></div>
        <div class="ov ov-paper"><img src="${A.paper.url}" alt=""></div>
        <div class="ov-highlight"><img src="${A.highlight.url}" alt=""></div>
        <div class="ov-spineline"></div>
        <img class="ov-spinevec" src="${A.spine.url}" alt="">
        <div class="ov ov-inset"></div>
        <div class="badge" hidden></div>`;
      phone.appendChild(b);
      slotEls[cell.slot] = {
        book: b, cropClip: b.querySelector('.cropclip'), cropImg: b.querySelector('.cover'),
        ph: b.querySelector('.ph'), badge: b.querySelector('.badge'), title: t,
      };
      bindBook(b, cell.slot);
      updateSlotDOM(cell.slot);
    }
  }
  buildChrome();
  updatePanel();
}

function updateSlotDOM(i) {
  const e = slotEls[i]; if (!e) return;
  const s = slots[i];
  if (s.img) {
    const { dw, dh, x, y, sc } = cropRect(s);
    const { sx, sy } = srcRect(s);
    e.cropClip.style.cssText = `left:${x}px;top:${y}px;width:${dw}px;height:${dh}px;`;
    e.cropImg.style.cssText = `left:${-sx * sc}px;top:${-sy * sc}px;width:${s.img.naturalWidth * sc}px;height:${s.img.naturalHeight * sc}px;`;
    e.cropImg.src = s.img.src;
    e.cropClip.hidden = false;
    e.ph.hidden = true;
  } else {
    e.cropClip.hidden = true;
    e.ph.hidden = false;
  }
  const dim = s.badge === 'COMING SOON';
  e.book.classList.toggle('dim', dim);
  e.title.classList.toggle('dim', dim);
  e.title.querySelector('p').textContent = s.title;
  if (s.badge) {
    e.badge.hidden = false;
    e.badge.textContent = s.badge;
    e.badge.classList.toggle('coming', dim);
  } else e.badge.hidden = true;
}

function buildChrome() {
  const el = document.createElement('div');
  el.innerHTML = `
    <div class="nav-grad"></div>
    <div class="st-time">9:41</div>
    <div class="st-levels">
      <img src="${A.cellular.url}" style="width:19.2px;height:12.2px" alt="">
      <img src="${A.wifi.url}" style="width:17.1px;height:12.3px" alt="">
      <img src="${A.battery.url}" style="width:27.3px;height:13px" alt="">
    </div>
    <div class="toolbar-ic on"><img src="${A.icBook.url}" alt=""></div>
    <div class="toolbar-ic off"><img src="${A.icImage.url}" alt=""></div>
    <div class="tabbar"></div>
    <div class="tb-item" style="left:51px;top:769px;z-index:9"><img class="ic" src="${A.icHome.url}" style="opacity:.5" alt=""><div class="lb">Home</div></div>
    <div class="tb-item" style="left:111px;top:769px;z-index:9"><img class="ic" src="${A.icTalk.url}" style="opacity:.5" alt=""><div class="lb">Poppin’</div></div>
    <img class="tb-dot" src="${A.dot.url}" style="left:139px;top:770px" alt="">
    <div class="tb-center" style="left:171px;top:746px;z-index:9">

      <div class="lb" style="font-size:11px;line-height:15px;color:rgba(255,255,255,.5);text-align:center;margin-top:2px;text-shadow:0 0 4px rgba(0,0,0,.25)">Book</div>
    </div>
    <div class="tb-item" style="left:231px;top:769px;z-index:9"><img class="ic" src="${A.icShop.url}" style="opacity:.5" alt=""><div class="lb">Shop</div></div>
    <div class="tb-item" style="left:291px;top:769px;z-index:9"><img class="ic" src="${A.icMypage.url}" style="opacity:.5" alt=""><div class="lb">Mypage</div></div>
    <div class="home-ind"></div>`;
  while (el.firstChild) phone.appendChild(el.firstChild);
}

/* ================= interactions ================= */
function bindBook(b, i) {
  let drag = null;
  b.addEventListener('pointerdown', e => {
    e.preventDefault();
    select(i);
    const s = slots[i];
    if (!s.img) return;
    const r = cropRect(s);
    drag = { sx: e.clientX, sy: e.clientY, ox: r.x, oy: r.y, moved: false };
    b.setPointerCapture(e.pointerId);
    b.classList.add('dragging');
  });
  b.addEventListener('pointermove', e => {
    if (!drag) return;
    const z = previewZoom();
    const dx = (e.clientX - drag.sx) / z, dy = (e.clientY - drag.sy) / z;
    if (Math.abs(dx) + Math.abs(dy) > 2) drag.moved = true;
    setPanPx(slots[i], drag.ox + dx, drag.oy + dy);
    updateSlotDOM(i);
    if (i === selected) syncZoomUI();
  });
  b.addEventListener('pointerup', e => {
    b.classList.remove('dragging');
    const wasDrag = drag && drag.moved;
    drag = null;
    if (!wasDrag && !slots[i].img) fileInput.click();
  });
  b.addEventListener('wheel', e => {
    e.preventDefault();
    select(i);
    const s = slots[i];
    if (!s.img) return;
    const z = previewZoom();
    const rect = b.getBoundingClientRect();
    const px = (e.clientX - rect.left) / z, py = (e.clientY - rect.top) / z;
    const before = cropRect(s);
    const u = (px - before.x) / before.sc, v = (py - before.y) / before.sc;
    s.zoom = Math.min(4, Math.max(minZoom(s), s.zoom * Math.exp(-e.deltaY * 0.0018)));
    const after = cropRect(s);
    setPanPx(s, px - u * after.sc, py - v * after.sc);
    updateSlotDOM(i);
    syncZoomUI();
  }, { passive: false });
  b.addEventListener('dragover', e => e.preventDefault());
  b.addEventListener('drop', e => {
    e.preventDefault();
    const f = e.dataTransfer.files && e.dataTransfer.files[0];
    if (f && f.type.startsWith('image/')) { select(i); loadUserImage(f, i); }
  });
}

function select(i) {
  if (selected === i) return;
  const prev = slotEls[selected];
  if (prev) prev.book.classList.remove('selected');
  selected = i;
  const cur = slotEls[i];
  if (cur) cur.book.classList.add('selected');
  updatePanel();
}

function loadUserImage(file, i) {
  const url = URL.createObjectURL(file);
  loadImg(url).then(img => {
    const s = slots[i];
    s.img = img; s.zoom = Math.max(minZoom(s), 1); s.ox = 0; s.oy = 0;
    s.trim = { t: 0, r: 0, b: 0, l: 0 };
    updateSlotDOM(i);
    syncZoomUI();
  });
}

/* ================= panel ================= */
const fileInput = document.getElementById('fileInput');
const zoomSlider = document.getElementById('zoomSlider');
const zoomVal = document.getElementById('zoomVal');
const titleInput = document.getElementById('titleInput');
const badgeSel = document.getElementById('badgeSel');
const selInfo = document.getElementById('selInfo');

function slotLabel(i) {
  if (i === 6) return 'Book 1つ表示のブック';
  return `6ブックUI — Book ${i + 1}`;
}
function updatePanel() {
  selInfo.textContent = slotLabel(selected);
  const s = slots[selected];
  titleInput.value = s.title;
  badgeSel.value = s.badge;
  syncZoomUI();
}
function syncZoomUI() {
  const s = slots[selected];
  freeChk.checked = s.free;
  zoomSlider.min = minZoom(s);
  zoomSlider.value = s.zoom;
  zoomVal.textContent = Math.round(s.zoom * 100) + '%';
  if (s.img) {
    const r = cropRect(s);
    posX.value = Math.round(r.x);
    posY.value = Math.round(r.y);
  } else { posX.value = ''; posY.value = ''; }
  trimT.value = s.trim.t; trimB.value = s.trim.b;
  trimL.value = s.trim.l; trimR.value = s.trim.r;
}
document.getElementById('pickBtn').onclick = () => fileInput.click();
fileInput.onchange = () => {
  if (fileInput.files[0]) loadUserImage(fileInput.files[0], selected);
  fileInput.value = '';
};
const freeChk = document.getElementById('freeChk');
const posX = document.getElementById('posX');
const posY = document.getElementById('posY');
zoomSlider.oninput = () => {
  const s = slots[selected];
  s.zoom = parseFloat(zoomSlider.value);
  if (s.img) setPanPx(s, cropRect(s).x, cropRect(s).y); // re-clamp
  updateSlotDOM(selected);
  syncZoomUI();
};
freeChk.onchange = () => {
  const s = slots[selected];
  s.free = freeChk.checked;
  if (!s.free) {
    s.zoom = Math.max(1, s.zoom);
    if (s.img) setPanPx(s, cropRect(s).x, cropRect(s).y); // snap back into cover
  }
  updateSlotDOM(selected);
  syncZoomUI();
};
function onPosInput() {
  const s = slots[selected];
  if (!s.img) return;
  setPanPx(s, parseFloat(posX.value) || 0, parseFloat(posY.value) || 0);
  updateSlotDOM(selected);
}
posX.oninput = onPosInput;
posY.oninput = onPosInput;
const trimT = document.getElementById('trimT'), trimB = document.getElementById('trimB');
const trimL = document.getElementById('trimL'), trimR = document.getElementById('trimR');
function onTrimInput() {
  const s = slots[selected];
  const v = el => Math.min(90, Math.max(0, parseFloat(el.value) || 0));
  let t = v(trimT), b = v(trimB), l = v(trimL), r = v(trimR);
  // keep at least 10% of the image in each axis
  if (t + b > 90) { b = 90 - t; trimB.value = b; }
  if (l + r > 90) { r = 90 - l; trimR.value = r; }
  s.trim = { t, r, b, l };
  if (s.img) setPanPx(s, cropRect(s).x, cropRect(s).y); // re-clamp pan for new source size
  updateSlotDOM(selected);
  if (s.img) { const cr = cropRect(s); posX.value = Math.round(cr.x); posY.value = Math.round(cr.y); }
}
[trimT, trimB, trimL, trimR].forEach(el => el.oninput = onTrimInput);
document.getElementById('resetBtn').onclick = () => {
  const s = slots[selected];
  s.zoom = Math.max(minZoom(s), 1); s.ox = 0; s.oy = 0;
  s.trim = { t: 0, r: 0, b: 0, l: 0 };
  updateSlotDOM(selected);
  syncZoomUI();
};
titleInput.oninput = () => { slots[selected].title = titleInput.value; updateSlotDOM(selected); };
badgeSel.onchange = () => { slots[selected].badge = badgeSel.value; updateSlotDOM(selected); };

/* ================= tabs / scaling ================= */
document.getElementById('tabSingle').onclick = () => setMode('single');
document.getElementById('tabGrid').onclick = () => setMode('grid');
function setMode(m) {
  if (mode === m) return;
  mode = m;
  selected = m === 'single' ? 6 : 0;
  document.getElementById('tabSingle').classList.toggle('active', m === 'single');
  document.getElementById('tabGrid').classList.toggle('active', m === 'grid');
  render();
}
function previewZoom() {
  const st = document.getElementById('stage');
  return Math.min(1, (st.clientHeight - 40) / H, (st.clientWidth - 40) / W);
}
function fit() {
  const z = previewZoom();
  phone.style.transform = `scale(${z})`;
  const sc = document.getElementById('phoneScaler');
  sc.style.width = W * z + 'px';
  sc.style.height = H * z + 'px';
}
window.addEventListener('resize', fit);

/* ================= canvas export ================= */
function rrPath(ctx, x, y, w, h, tl, tr, br, bl) {
  ctx.beginPath();
  ctx.moveTo(x + tl, y);
  ctx.lineTo(x + w - tr, y); ctx.arcTo(x + w, y, x + w, y + tr, tr);
  ctx.lineTo(x + w, y + h - br); ctx.arcTo(x + w, y + h, x + w - br, y + h, br);
  ctx.lineTo(x + bl, y + h); ctx.arcTo(x, y + h, x, y + h - bl, bl);
  ctx.lineTo(x, y + tl); ctx.arcTo(x, y, x + tl, y, tl);
  ctx.closePath();
}
function wrapLines(ctx, text, maxW, maxLines) {
  const lines = [];
  let line = '';
  for (const ch of text) {
    if (ch === '\n') { lines.push(line); line = ''; continue; }
    if (ctx.measureText(line + ch).width > maxW && line) {
      // prefer breaking at last space for latin text
      const sp = line.lastIndexOf(' ');
      if (sp > 0 && /[\x20-\x7E]/.test(ch)) {
        lines.push(line.slice(0, sp));
        line = line.slice(sp + 1) + ch;
      } else { lines.push(line); line = ch; }
    } else line += ch;
    if (lines.length === maxLines) break;
  }
  if (lines.length < maxLines && line) lines.push(line);
  if (lines.length === maxLines) {
    // ellipsis if content remains
    const used = lines.join('').replace(/ /g, '').length;
    if (used < text.replace(/[\s\n]/g, '').length) {
      let last = lines[maxLines - 1];
      while (last && ctx.measureText(last + '…').width > maxW) last = last.slice(0, -1);
      lines[maxLines - 1] = last + '…';
    }
  }
  return lines;
}

function drawBook(ctx, s, bx, by) {
  const dim = s.badge === 'COMING SOON';
  // drop shadow base
  ctx.save();
  ctx.shadowColor = 'rgba(16,16,16,.3)'; ctx.shadowBlur = 3; ctx.shadowOffsetY = 2;
  rrPath(ctx, bx, by, BW, BH, 1, 6, 6, 1);
  ctx.fillStyle = '#1b1b1b'; ctx.fill();
  ctx.restore();

  ctx.save();
  rrPath(ctx, bx, by, BW, BH, 1, 6, 6, 1);
  ctx.clip();
  // cover image (bg first — free mode can leave gaps around the image)
  ctx.fillStyle = '#1b1b1b'; ctx.fillRect(bx, by, BW, BH);
  if (s.img) {
    const r = cropRect(s);
    const { sx, sy, sw, sh } = srcRect(s);
    ctx.drawImage(s.img, sx, sy, sw, sh, bx + r.x, by + r.y, r.dw, r.dh);
  } else {
    ctx.fillStyle = 'rgba(255,255,255,.35)';
    ctx.font = '500 11px Figtree, "Hiragino Sans", sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('No Image', bx + BW / 2, by + BH / 2);
    ctx.textAlign = 'left';
  }
  // reflection gradient (144.79deg ≈ TL→BR)
  let g = ctx.createLinearGradient(bx, by, bx + BW, by + BH);
  g.addColorStop(0, 'rgba(255,255,255,.25)'); g.addColorStop(1, 'rgba(16,16,16,0)');
  ctx.fillStyle = g; ctx.fillRect(bx, by, BW, BH);
  // paper texture (multiply)
  ctx.save();
  ctx.globalCompositeOperation = 'multiply';
  const p = A.paper.img;
  const psc = Math.max(BW / p.naturalWidth, BH / p.naturalHeight);
  ctx.drawImage(p, bx + (BW - p.naturalWidth * psc) / 2, by + (BH - p.naturalHeight * psc) / 2, p.naturalWidth * psc, p.naturalHeight * psc);
  ctx.restore();
  // highlight strip
  ctx.drawImage(A.highlight.img, bx + 6, by, 4, BH);
  // spine dark line (multiply)
  ctx.save();
  ctx.globalCompositeOperation = 'multiply';
  ctx.fillStyle = 'rgba(16,16,16,.5)';
  ctx.fillRect(bx, by, 1.5, BH);
  ctx.restore();
  // spine groove vector
  ctx.drawImage(A.spine.img, bx + 7.5, by - 2, 5, 202);
  // inset shadows (approx)
  g = ctx.createLinearGradient(0, by + BH - 12, 0, by + BH);
  g.addColorStop(0, 'rgba(16,16,16,0)'); g.addColorStop(1, 'rgba(16,16,16,.2)');
  ctx.fillStyle = g; ctx.fillRect(bx, by + BH - 12, BW, 12);
  ctx.fillStyle = 'rgba(255,255,255,.4)'; ctx.fillRect(bx, by, BW, 1);
  // badge
  if (s.badge) {
    ctx.font = '600 12px Figtree, "Hiragino Sans", sans-serif';
    const tw = ctx.measureText(s.badge).width;
    const bw = 10 + tw + 12, bh = 22, byy = by + BH - 8 - bh;
    rrPath(ctx, bx, byy, bw, bh, 0, 16, 16, 0);
    if (dim) ctx.fillStyle = 'rgba(0,0,0,.65)';
    else {
      const bg = ctx.createLinearGradient(bx, byy, bx + bw * 0.21, byy + bh);
      bg.addColorStop(0, 'rgb(129,45,255)'); bg.addColorStop(1, 'rgb(255,103,57)');
      ctx.fillStyle = bg;
    }
    ctx.fill();
    ctx.fillStyle = dim ? 'rgba(255,255,255,.5)' : '#fff';
    ctx.fillText(s.badge, bx + 10, byy + 15);
  }
  ctx.restore();
  // dim (opacity 50% over #101010 bg)
  if (dim) {
    ctx.save();
    rrPath(ctx, bx, by, BW, BH, 1, 6, 6, 1);
    ctx.clip();
    ctx.fillStyle = 'rgba(16,16,16,.5)';
    ctx.fillRect(bx - 2, by - 4, BW + 4, BH + 8);
    ctx.restore();
  }
}

function drawScene(ctx) {
  ctx.fillStyle = '#101010';
  ctx.fillRect(0, 0, W, H);
  const L = LAYOUTS[mode];
  for (const col of L.columns) {
    const by = col.y + col.titleH + 8;
    ctx.drawImage(A[col.shelf].img, -20, by + BH - 12 - 16, 430, 116);
    for (const cell of col.cells) {
      const s = slots[cell.slot];
      const dim = s.badge === 'COMING SOON';
      // title
      ctx.font = '500 12px Figtree, "Hiragino Sans", sans-serif';
      ctx.fillStyle = dim ? 'rgba(255,255,255,.5)' : '#fff';
      const lines = wrapLines(ctx, s.title, BW, col.titleH === 16 ? 1 : 2);
      const startY = col.y + (col.titleH - lines.length * 16) / 2 + 12;
      lines.forEach((ln, k) => ctx.fillText(ln, cell.x + 10, startY + k * 16));
      drawBook(ctx, s, cell.x + 10, by);
    }
  }
  /* --- nav gradient + status bar --- */
  let g = ctx.createLinearGradient(0, 0, 0, 112);
  g.addColorStop(0, 'rgba(0,0,0,.58)'); g.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, 112);
  ctx.fillStyle = '#fff';
  ctx.font = '600 17px -apple-system, "SF Pro", sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('9:41', 74, 30);
  ctx.textAlign = 'left';
  ctx.drawImage(A.cellular.img, 277, 17, 19.2, 12.2);
  ctx.drawImage(A.wifi.img, 303.2, 17, 17.1, 12.3);
  ctx.drawImage(A.battery.img, 327.3, 16.5, 27.3, 13);
  /* --- toolbar circles --- */
  ctx.fillStyle = 'rgba(255,255,255,.08)';
  ctx.beginPath(); ctx.arc(159, 84, 24, 0, 7); ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,.15)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.arc(159, 84, 23.5, 0, 7); ctx.stroke();
  ctx.strokeStyle = 'rgba(255,255,255,.08)';
  ctx.beginPath(); ctx.arc(231, 84, 23.5, 0, 7); ctx.stroke();
  ctx.drawImage(A.icBook.img, 147, 72, 24, 24);
  ctx.save(); ctx.globalAlpha = .5; ctx.drawImage(A.icImage.img, 219, 72, 24, 24); ctx.restore();
  /* --- tabbar --- */
  rrPath(ctx, 31, 756, 328, 64, 42, 42, 42, 42);
  ctx.fillStyle = 'rgba(0,0,0,.65)'; ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,.15)'; ctx.stroke();
  ctx.font = '400 11px Figtree, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,.5)';
  ctx.textAlign = 'center';
  const items = [
    { x: 51, ic: 'icHome', lb: 'Home' },
    { x: 111, ic: 'icTalk', lb: 'Poppin’' },
    { x: 231, ic: 'icShop', lb: 'Shop' },
    { x: 291, ic: 'icMypage', lb: 'Mypage' },
  ];
  for (const it of items) {
    ctx.save(); ctx.globalAlpha = .5; ctx.drawImage(A[it.ic].img, it.x + 12, 769, 24, 24); ctx.restore();
    ctx.fillText(it.lb, it.x + 24, 808);
  }
  ctx.drawImage(A.dot.img, 139, 770, 12, 12);
  // active Book
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(195, 770, 24, 0, 7); ctx.fill();
  ctx.drawImage(A.icImages.img, 184, 759, 22, 22);
  ctx.fillStyle = 'rgba(255,255,255,.5)';
  ctx.fillText('Book', 195, 808);
  ctx.textAlign = 'left';
  /* --- home indicator --- */
  rrPath(ctx, 128, 831, 134, 5, 2.5, 2.5, 2.5, 2.5);
  ctx.fillStyle = '#fff'; ctx.fill();
}

const exTarget = document.getElementById('exTarget');
const exScale = document.getElementById('exScale');
function updateScaleLabels() {
  const img = exTarget.value === 'image';
  for (const op of exScale.options) {
    const k = +op.value;
    op.textContent = img ? `×${k} (${BW * k}×${BH * k})` : `×${k} (${W * k}×${H * k})`;
  }
}
exTarget.onchange = updateScaleLabels;
updateScaleLabels();

function downloadCanvas(c, name) {
  c.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 5000);
  }, 'image/png');
}

document.getElementById('exportBtn').onclick = async () => {
  await document.fonts.ready;
  const k = parseInt(exScale.value, 10);
  const c = document.createElement('canvas');
  const ctx = c.getContext('2d');
  if (exTarget.value === 'image') {
    const s = slots[selected];
    if (!s.img) { alert('選択中のブックに画像がありません。'); return; }
    c.width = BW * k; c.height = BH * k;
    ctx.scale(k, k);
    // cropped image only — no book texture; free-mode gaps stay transparent
    const r = cropRect(s);
    const { sx, sy, sw, sh } = srcRect(s);
    ctx.drawImage(s.img, sx, sy, sw, sh, r.x, r.y, r.dw, r.dh);
    const slotName = selected === 6 ? 'single' : `book${selected + 1}`;
    downloadCanvas(c, `book_cover_${slotName}_${k}x.png`);
  } else {
    c.width = W * k; c.height = H * k;
    ctx.scale(k, k);
    drawScene(ctx);
    downloadCanvas(c, `book_ui_${mode === 'single' ? '1book' : '6books'}_${k}x.png`);
  }
};

/* ================= boot ================= */
Promise.all(Object.entries(ASSET_SRC).map(([n, s]) => loadAsset(n, s)))
  .then(() => Promise.all(slots.map(s =>
    s.src ? loadImg(s.src).then(img => { s.img = img; }).catch(() => {}) : Promise.resolve()
  )))
  .then(() => { render(); fit(); });
</script>
