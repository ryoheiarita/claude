<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BWITHU Prototypes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Figtree', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      width: 100%;
      max-width: 560px;
      padding: 48px 24px;
    }
    .header {
      margin-bottom: 48px;
    }
    .header h1 {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 8px;
    }
    .header h2 {
      font-size: 32px;
      font-weight: 700;
      line-height: 1.2;
    }
    .cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .card {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 24px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      text-decoration: none;
      color: inherit;
      transition: background 0.2s, border-color 0.2s;
    }
    .card:hover {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.15);
    }
    .card-icon {
      width: 56px;
      height: 56px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 24px;
    }
    .card-icon.badge { background: linear-gradient(135deg, #7c8cff 0%, #5c4dff 100%); }
    .card-icon.article { background: linear-gradient(135deg, #ff7eb3 0%, #ff4081 100%); }
    .card-icon.handoff { background: linear-gradient(135deg, #48c7a5 0%, #2f9e87 100%); }
    .card-body {
      flex: 1;
      min-width: 0;
    }
    .card-title {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 4px;
    }
    .card-desc {
      font-size: 13px;
      font-weight: 400;
      line-height: 1.5;
      color: rgba(255,255,255,0.45);
    }
    .card-arrow {
      flex-shrink: 0;
      color: rgba(255,255,255,0.25);
      font-size: 20px;
    }
    .footer {
      margin-top: 48px;
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>BWITHU</h1>
      <h2>Prototypes</h2>
    </div>
    <div class="cards">
      <a class="card" href="badge.html">
        <div class="card-icon badge">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        </div>
        <div class="card-body">
          <div class="card-title">3D Badge Generator</div>
          <div class="card-desc">Enamel pin badge 3D preview with customizable colors and export</div>
        </div>
        <div class="card-arrow">&rsaquo;</div>
      </a>
      <a class="card" href="article/home.html">
        <div class="card-icon article">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2z"/><path d="M12 6v6l4 2"/></svg>
        </div>
        <div class="card-body">
          <div class="card-title">Article Loading</div>
          <div class="card-desc">Loading animation patterns — Icon, Text, Artist, Skeleton modes</div>
        </div>
        <div class="card-arrow">&rsaquo;</div>
      </a>
      <a class="card" href="handoff.html">
        <div class="card-icon handoff">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </div>
        <div class="card-body">
          <div class="card-title">Flutter 素材引き渡し</div>
          <div class="card-desc">Loading icon, heart &amp; bookmark animations — Dart + Lottie + docs (ZIP download)</div>
        </div>
        <div class="card-arrow">&rsaquo;</div>
      </a>
    </div>
    <div class="footer">BWITHU BMSG</div>
  </div>
</body>
</html>
