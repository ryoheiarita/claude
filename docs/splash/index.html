<!DOCTYPE html>
<html lang="ja">
<head>
  <script src="../gate.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Splash〜利用規約〜ログイン — BwithU（挙動イメージ）</title>
  <!--
    ═══════════════════════════════════════════════════════════════
    スプラッシュ〜利用規約〜ログイン プロトタイプ（Flutter 実装向けリファレンス）

    フロー:
      1. スプラッシュ (2.5s): 黒背景 + ブロブアニメーション + 中央ロゴ
         タイムライン:
           0.2s〜     ロゴ出現: Lottie 書き順アニメ再生開始
                      （logo-anim/bwu-splash-custom@2x.json、
                        960×400・60fps・約1.6s。B フェード→W 筆書き→U）
           1.0s〜     カラーレイヤーが 0.3s 間隔でドミノ出現
                      （オレンジ→マゼンタ→緑→青、各 0.6s フェード）
           2.5s       利用規約ダイアログへ
         Lottie は lottie-web (CDN) で再生。CDN 不達時は静的ロゴの
         フェードインにフォールバック。Flutter では lottie パッケージで
         同じ JSON をそのまま再生可能
      2. 利用規約ダイアログ: 黒80% + blur8px のスクリムの上にグラスダイアログ
         - 言語ドロップダウン（日本語/English/中文/한국어/Español）
         - 利用規約リンク×3 + 同意チェックボックス
         - チェックONで「完了」ボタンが活性化（白背景 + #191919 文字）
      3. ログイン画面: ブロブ背景 + ロゴ + 下部グラデーション
         + 新規会員登録（白）/ ログイン（アウトライン）ボタン
         ロゴはボタン群を除いた残りの画面高に対して縦中央
         （top: (100dvh - 196px) / 2 へ 0.5s でスライド）

    背景アニメーション:
      - SVG radialGradient ×4 を回転・平行移動（SMIL）
        カラーは Figma のブロブ画像から抽出:
          ブルー    #1F32D9 (alpha 1.0)   ← メイン・最前面
          グリーン  #1FD738 (alpha 0.95)  ← メイン
          マゼンタ  #F53358 (alpha 0.55)  ← 差し色（暖色）
          オレンジ  #EC5E16 (alpha 0.5)   ← 差し色（暖色）
      - 描画順: オレンジ → マゼンタ → 緑 → 青（メインの緑・青が前面）
      - 回転に初期位相オフセットを付与し、出現時のコア位置を四隅に分散:
          オレンジ=左上(45°) / マゼンタ=右上(135°) / 緑=左下(315°) / 青=右下(225°)
      - 各グラデーションの focal point (fx): 1%→5%→1% を 7〜10s で往復
      - 各グラデーションの focal point (fx): 15%→40%→15% を 7〜10s で往復
        （コアがオーブ内を横切り、色が鮮やかに出るよう拡大）
      - 各 rect: x/y を 7〜10s で往復 + 4〜6.5s で 360° 回転
      - 緩急（有機感）: 各動きは「前半ゆっくり → 後半速く」
          往復系 (fx/x/y): 前半 2/3 の時間で行き、後半 1/3 で戻る（速度比 1:2）
          回転: 前半 60% の時間で 72°（約1/3倍速）→ 後半 40% で 288°（約2倍速）
      - シームレス化:
          往復系 (fx/x/y): 両端で速度0の振り子型（0.4 0 0.2 1）。
            折り返し・ループ境界とも速度が一致し継ぎ目なし
          回転: keySplines "0.2 0.4 0.8 0.6; 0.3 0.1 0.7 0.9"
            セグメント境界・ループ境界の角速度をすべて 240°/周期 に揃えた
            C1 連続カーブ。回転が止まらず緩急だけが波打つ
      - repeatCount: indefinite（無限ループ）
      - 色の強弱は stop-color の alpha で調整する
        （注意: r を 0.5 未満にすると focal point (fx) が円の外に出て
          ハードエッジのアーティファクトが発生する。r は 0.5 固定）

    デザイントークン（Figma より）:
      - BG: #101010（本プロトはブロブ用に #000000）
      - ダイアログ: bg rgba(255,255,255,0.15) + backdrop-blur 32px, radius 24
      - 入力/ボックス: bg rgba(255,255,255,0.08), border rgba(255,255,255,0.15), radius 12
      - スクリム: rgba(0,0,0,0.8) + backdrop-blur 8px
      - ボタン(非活性): bg rgba(255,255,255,0.25) + blur 6, text rgba(255,255,255,0.5)
      - ボタン(活性/白): bg #FFFFFF, text #191919
      - フォント: Figtree（英数）/ Hiragino Sans W7 ≒ Noto Sans JP 700（ボタン和文）

    Flutter 検証メモ:
      - flutter_svg は SMIL 非対応。WebView で本 HTML を表示するか、
        CustomPainter + AnimationController で RadialGradient を再実装する
    ═══════════════════════════════════════════════════════════════
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bodymovin/5.12.2/lottie.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    :root {
      --c-bg: #000000;
      --c-logo: #ffffff;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --font: 'Figtree', -apple-system, 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
    }

    html, body {
      background: var(--c-bg);
      font-family: var(--font);
      height: 100%;
      overflow: hidden;
    }

    .phone {
      position: relative;
      width: 100%;
      height: 100dvh;
      background: var(--c-bg);
      overflow: clip;
    }

    /* ════════════ 背景ブロブアニメーション（全画面共通） ════════════ */
    #bg-wrap { position: absolute; inset: 0; }
    #bg-wrap svg { display: block; width: 100%; height: 100%; }

    /* ロゴ出現(1.0s完了)の後、カラーレイヤーが 0.3s 間隔でドミノ出現
       （DOM順 = 重なり順: オレンジ → マゼンタ → 緑 → 青） */
    #bg-wrap rect {
      opacity: 0;
      animation: layer-in 0.6s var(--ease) forwards;
    }
    #bg-wrap rect:nth-of-type(1) { animation-delay: 1.0s; }
    #bg-wrap rect:nth-of-type(2) { animation-delay: 1.3s; }
    #bg-wrap rect:nth-of-type(3) { animation-delay: 1.6s; }
    #bg-wrap rect:nth-of-type(4) { animation-delay: 1.9s; }
    @keyframes layer-in { to { opacity: 1; } }

    /* ════════════ 中央ロゴ（スプラッシュ / ログイン共通） ════════════ */
    .logo {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      /* Lottie コンポ 960×400 のうちロゴ実体は 678px（中央）
         → 表示ロゴ幅 164px にするためコンテナは 164 / (678/960) ≒ 232px */
      width: 232px;
      color: var(--c-logo);
      transition: top 0.5s var(--ease);
    }
    #logo-lottie { width: 100%; aspect-ratio: 960 / 400; }
    /* Lottie が読めない場合の静的フォールバック */
    .logo .logo-static { display: none; width: 164px; margin: 0 auto; }
    .logo.fallback #logo-lottie { display: none; }
    .logo.fallback .logo-static {
      display: block;
      opacity: 0;
      animation: logo-in 0.8s var(--ease) 0.2s forwards;
    }
    /* ログイン画面: ボタン群（下部 196px = padding 80 + ボタン 50×2 + gap 16）を
       除いた残りの高さに対して縦中央 */
    .phase-login .logo { top: calc((100dvh - 196px) / 2); }
    .logo svg { display: block; width: 100%; height: auto; }
    @keyframes logo-in { from { opacity: 0; } to { opacity: 1; } }

    /* ════════════ 利用規約: スクリム + ダイアログ ════════════ */
    .scrim {
      position: absolute; inset: 0;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s var(--ease);
    }
    .phase-terms .scrim { opacity: 1; pointer-events: auto; }

    .terms {
      position: absolute; inset: 0;
      display: flex; align-items: center;
      padding: 0 32px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px);
      transition: opacity 0.5s var(--ease), transform 0.5s var(--ease);
    }
    .phase-terms .terms { opacity: 1; pointer-events: auto; transform: translateY(0); }

    .dialog {
      position: relative;
      width: 100%;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px);
      border-radius: 24px;
      padding: 32px 24px 24px;
      display: flex; flex-direction: column; gap: 24px;
    }
    .dialog-head { display: flex; flex-direction: column; gap: 8px; }
    .dialog-head h1 { font-size: 18px; font-weight: 700; line-height: 24px; color: #fff; }
    .dialog-head p  { font-size: 14px; font-weight: 400; line-height: 20px; color: rgba(255,255,255,0.75); }

    .field-label { font-size: 14px; line-height: 20px; color: rgba(255,255,255,0.5); }

    /* ---- 言語ドロップダウン ---- */
    .dropdown { position: relative; display: flex; flex-direction: column; gap: 4px; }
    .dropdown-field {
      height: 48px;
      display: flex; align-items: center; gap: 8px;
      padding: 0 16px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      color: #fff; font-size: 14px; line-height: 20px;
      cursor: pointer;
      user-select: none;
    }
    .dropdown-field .value { flex: 1; }
    .dropdown-field .caret { display: block; transition: transform 0.25s var(--ease); }
    .dropdown.open .caret { transform: rotate(180deg); }

    .dropdown-menu {
      position: absolute;
      top: calc(100% + 6px); left: 0; right: 0;
      z-index: 10;
      /* 親ダイアログが backdrop-filter を持つため、入れ子の blur は
         Chromium で描画順が壊れる。メニューはほぼ不透明の単色にする */
      background: #2E2E30;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      overflow: hidden;
      opacity: 0;
      transform: translateY(-4px);
      pointer-events: none;
      transition: opacity 0.25s var(--ease), transform 0.25s var(--ease);
    }
    .dropdown.open .dropdown-menu { opacity: 1; transform: translateY(0); pointer-events: auto; }
    .dropdown-menu li {
      list-style: none;
      height: 48px;
      display: flex; align-items: center;
      padding: 0 16px;
      color: #fff; font-size: 14px; line-height: 20px;
      cursor: pointer;
    }
    .dropdown-menu li.selected { background: rgba(255,255,255,0.12); }
    .dropdown-menu li:active { background: rgba(255,255,255,0.18); }

    /* ---- 利用規約ボックス ---- */
    .terms-input { display: flex; flex-direction: column; gap: 4px; }
    .terms-box {
      background: rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .terms-box .desc { font-size: 14px; line-height: 20px; color: #fff; }
    .terms-links { display: flex; flex-direction: column; }
    .terms-links a {
      height: 32px;
      display: flex; align-items: center;
      color: #fff; font-size: 14px;
      text-decoration: underline;
      text-underline-position: from-font;
    }
    .terms-links a svg { margin-left: 0; }

    .agree-row { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
    .checkbox {
      width: 32px; height: 32px; flex: none;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s var(--ease);
    }
    .checkbox svg { opacity: 0; transform: scale(0.6); transition: opacity 0.2s var(--ease), transform 0.2s var(--ease); }
    .agree-row.checked .checkbox svg { opacity: 1; transform: scale(1); }
    .agree-row .agree-label { font-size: 14px; line-height: 20px; color: #fff; }

    /* ---- 完了ボタン ---- */
    .btn-done {
      width: 100%;
      padding: 14px 24px;
      border: none;
      border-radius: 999px;
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      color: rgba(255,255,255,0.5);
      font-family: var(--font);
      font-size: 14px; font-weight: 600; line-height: 20px;
      text-align: center;
      cursor: default;
      transition: background 0.3s var(--ease), color 0.3s var(--ease);
    }
    .btn-done.enabled { background: #fff; color: #191919; cursor: pointer; }
    .btn-done.enabled:active { background: rgba(255,255,255,0.85); }

    /* ════════════ ログイン画面 ════════════ */
    .login {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 80px 24px;
      background: linear-gradient(to bottom, rgba(0,0,0,0) 59.6%, rgba(0,0,0,0.9) 100%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s var(--ease);
    }
    .phase-login .login { opacity: 1; pointer-events: auto; }

    .login-actions {
      display: flex; flex-direction: column; gap: 16px;
      transform: translateY(16px);
      transition: transform 0.5s var(--ease);
    }
    .phase-login .login-actions { transform: translateY(0); }

    .btn-pill {
      width: 100%;
      padding: 14px 10px;
      border-radius: 999px;
      backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
      font-family: 'Hiragino Sans', 'Noto Sans JP', var(--font);
      font-size: 14px; font-weight: 700; line-height: 20px;
      text-align: center;
      cursor: pointer;
    }
    .btn-signup {
      background: #fff;
      border: 1px solid rgba(255,255,255,0.2);
      color: #191919;
    }
    .btn-signup:active { background: rgba(255,255,255,0.85); }
    .btn-login {
      background: transparent;
      border: 1px solid #fff;
      color: #fff;
    }
    .btn-login:active { background: rgba(255,255,255,0.15); }
  </style>
</head>
<body>
  <div class="phone" id="phone">

    <!-- 背景ブロブアニメーション（全画面共通） -->
    <div id="bg-wrap">
      <svg viewBox="0 0 100 100" preserveAspectRatio="xMidYMid slice">
        <defs>
          <!-- マゼンタ #F53358（差し色・暖色） -->
          <radialGradient id="Gradient1" cx="50%" cy="50%" fx="1%" fy="50%" r=".5">
            <animate attributeName="fx" dur="10s" values="1%;5%;1%" repeatCount="indefinite" keyTimes="0;0.667;1" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"></animate>
            <stop offset="0%" stop-color="rgba(245, 51, 88, 0.55)"></stop>
            <stop offset="100%" stop-color="rgba(245, 51, 88, 0)"></stop>
          </radialGradient>
          <!-- オレンジ #EC5E16（差し色・暖色） -->
          <radialGradient id="Gradient2" cx="50%" cy="50%" fx="1%" fy="50%" r=".5">
            <animate attributeName="fx" dur="8s" values="1%;5%;1%" repeatCount="indefinite" keyTimes="0;0.667;1" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"></animate>
            <stop offset="0%" stop-color="rgba(236, 94, 22, 0.5)"></stop>
            <stop offset="100%" stop-color="rgba(236, 94, 22, 0)"></stop>
          </radialGradient>
          <!-- グリーン #1FD738（メイン） -->
          <radialGradient id="Gradient3" cx="50%" cy="50%" fx="1%" fy="50%" r=".5">
            <animate attributeName="fx" dur="7s" values="1%;5%;1%" repeatCount="indefinite" keyTimes="0;0.667;1" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"></animate>
            <stop offset="0%" stop-color="rgba(31, 215, 56, 0.95)"></stop>
            <stop offset="100%" stop-color="rgba(31, 215, 56, 0)"></stop>
          </radialGradient>
          <!-- ブルー #1F32D9（メインカラー・最前面） -->
          <radialGradient id="Gradient4" cx="50%" cy="50%" fx="1%" fy="50%" r=".5">
            <animate attributeName="fx" dur="9s" values="1%;5%;1%" repeatCount="indefinite" keyTimes="0;0.667;1" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"></animate>
            <stop offset="0%" stop-color="rgba(31, 50, 217, 1)"></stop>
            <stop offset="100%" stop-color="rgba(31, 50, 217, 0)"></stop>
          </radialGradient>
        </defs>

        <!-- オレンジ -->
        <rect x="-10%" y="10%" width="100%" height="100%" fill="url(#Gradient2)" transform="rotate(0 50 50)">
          <animate attributeName="x" dur="9s" values="-10%;0%;-10%" repeatCount="indefinite" keyTimes="0;0.667;1" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"></animate>
          <animate attributeName="y" dur="10s" values="10%;30%;10%" repeatCount="indefinite" keyTimes="0;0.667;1" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"></animate>
          <animateTransform attributeName="transform" type="rotate" values="45 50 50;117 50 50;405 50 50" keyTimes="0;0.6;1" calcMode="spline" keySplines="0.2 0.4 0.8 0.6; 0.3 0.1 0.7 0.9" dur="6s" repeatCount="indefinite"></animateTransform>
        </rect>
        <!-- マゼンタ -->
        <rect x="10%" y="5%" width="100%" height="100%" fill="url(#Gradient1)" transform="rotate(0 50 50)">
          <animate attributeName="x" dur="8s" values="10%;0%;10%" repeatCount="indefinite" keyTimes="0;0.667;1" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"></animate>
          <animate attributeName="y" dur="9s" values="5%;15%;5%" repeatCount="indefinite" keyTimes="0;0.667;1" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"></animate>
          <animateTransform attributeName="transform" type="rotate" values="135 50 50;207 50 50;495 50 50" keyTimes="0;0.6;1" calcMode="spline" keySplines="0.2 0.4 0.8 0.6; 0.3 0.1 0.7 0.9" dur="4s" repeatCount="indefinite"></animateTransform>
        </rect>
        <!-- グリーン -->
        <rect x="5%" y="5%" width="100%" height="100%" fill="url(#Gradient3)" transform="rotate(0 50 50)">
          <animate attributeName="x" dur="10s" values="5%;15%;5%" repeatCount="indefinite" keyTimes="0;0.667;1" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"></animate>
          <animate attributeName="y" dur="7s" values="5%;15%;5%" repeatCount="indefinite" keyTimes="0;0.667;1" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"></animate>
          <animateTransform attributeName="transform" type="rotate" values="675 50 50;603 50 50;315 50 50" keyTimes="0;0.6;1" calcMode="spline" keySplines="0.2 0.4 0.8 0.6; 0.3 0.1 0.7 0.9" dur="5s" repeatCount="indefinite"></animateTransform>
        </rect>
        <!-- ブルー -->
        <rect x="0%" y="-5%" width="100%" height="100%" fill="url(#Gradient4)" transform="rotate(0 50 50)">
          <animate attributeName="x" dur="7s" values="0%;10%;0%" repeatCount="indefinite" keyTimes="0;0.667;1" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"></animate>
          <animate attributeName="y" dur="8s" values="-5%;5%;-5%" repeatCount="indefinite" keyTimes="0;0.667;1" calcMode="spline" keySplines="0.4 0 0.2 1; 0.4 0 0.2 1"></animate>
          <animateTransform attributeName="transform" type="rotate" values="585 50 50;513 50 50;225 50 50" keyTimes="0;0.6;1" calcMode="spline" keySplines="0.2 0.4 0.8 0.6; 0.3 0.1 0.7 0.9" dur="6.5s" repeatCount="indefinite"></animateTransform>
        </rect>
      </svg>
    </div>

    <!-- 中央ロゴ（BWU / 表示幅164px）: Lottie 書き順アニメで出現 -->
    <div class="logo" id="logo">
      <div id="logo-lottie"></div>

    <!-- ════════════ 利用規約ダイアログ ════════════ -->
    <div class="scrim"></div>
    <div class="terms">
      <div class="dialog">
        <div class="dialog-head">
          <h1>B with Uへようこそ</h1>
          <p>言語設定と利用規約の同意が必要です</p>
        </div>

        <!-- 言語ドロップダウン -->
        <div class="dropdown" id="dropdown">
          <div class="field-label">言語設定 - Language</div>
          <div class="dropdown-field" id="dropdown-field">
            <span class="value" id="dropdown-value">日本語</span>
            <svg class="caret" width="24" height="24" viewBox="0 0 24 24" fill="none">
              <path d="M7 10L12 15L17 10" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <ul class="dropdown-menu" id="dropdown-menu">
            <li class="selected">日本語</li>
            <li>English</li>
            <li>中文</li>
            <li>한국어</li>
            <li>Español</li>
          </ul>
        </div>

        <!-- 利用規約への同意 -->
        <div class="terms-input">
          <div class="field-label">利用規約への同意</div>
          <div class="terms-box">
            <p class="desc">本アカウントは以下3つのサービスと共通のアカウントとなっております。ご登録前にそれぞれの利用規約をご覧ください。</p>
            <div class="terms-links">
              <a href="#" onclick="return false;">BMSG SHOP利用規約<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M9 15L15 9M15 9H10M15 9V14" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
              <a href="#" onclick="return false;">B-Town利用規約<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M9 15L15 9M15 9H10M15 9V14" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
              <a href="#" onclick="return false;">BwithU利用規約<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M9 15L15 9M15 9H10M15 9V14" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
            </div>
            <div class="agree-row" id="agree-row">
              <div class="checkbox">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                  <path d="M5 12.5L10 17.5L19 7" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
              </div>
              <span class="agree-label">利用規約に同意する</span>
            </div>
          </div>
        </div>

        <button class="btn-done" id="btn-done" disabled>完了</button>
      </div>
    </div>

    <!-- ════════════ ログイン画面 ════════════ -->
    <div class="login">
      <div class="login-actions">
        <button class="btn-pill btn-signup">新規会員登録</button>
        <button class="btn-pill btn-login">ログイン</button>
      </div>
    </div>

  </div>

  <script>
    const phone = document.getElementById('phone');


    // ── ロゴ出現: Lottie 書き順アニメーション（0.2s 遅延で再生開始） ──
    const logoEl = document.getElementById('logo');
    if (window.lottie) {
      const logoAnim = lottie.loadAnimation({
        container: document.getElementById('logo-lottie'),
        renderer: 'svg',
        loop: false,
        autoplay: false,
        path: 'logo-anim/bwu-splash-custom@2x.json',
      });
      window.logoAnim = logoAnim; // デバッグ用
      setTimeout(() => logoAnim.play(), 200);
    } else {
      logoEl.classList.add('fallback'); // CDN 不達時は静的ロゴをフェードイン
    }

    // ── スプラッシュ 2.5s → 利用規約ダイアログ
    setTimeout(() => phone.classList.add('phase-terms'), 2500);

    // ── 言語ドロップダウン
    const dropdown = document.getElementById('dropdown');
    const dropdownField = document.getElementById('dropdown-field');
    const dropdownValue = document.getElementById('dropdown-value');
    const dropdownMenu = document.getElementById('dropdown-menu');

    dropdownField.addEventListener('click', (e) => {
      e.stopPropagation();
      dropdown.classList.toggle('open');
    });
    dropdownMenu.querySelectorAll('li').forEach((li) => {
      li.addEventListener('click', () => {
        dropdownMenu.querySelector('.selected')?.classList.remove('selected');
        li.classList.add('selected');
        dropdownValue.textContent = li.textContent;
        dropdown.classList.remove('open');
      });
    });
    document.addEventListener('click', () => dropdown.classList.remove('open'));

    // ── 同意チェックボックス → 完了ボタン活性化
    const agreeRow = document.getElementById('agree-row');
    const btnDone = document.getElementById('btn-done');

    agreeRow.addEventListener('click', () => {
      agreeRow.classList.toggle('checked');
      const agreed = agreeRow.classList.contains('checked');
      btnDone.classList.toggle('enabled', agreed);
      btnDone.disabled = !agreed;
    });

    // ── 完了 → ログイン画面
    btnDone.addEventListener('click', () => {
      if (!btnDone.classList.contains('enabled')) return;
      phone.classList.remove('phase-terms');
      phone.classList.add('phase-login');
    });
  </script>
