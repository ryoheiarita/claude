<!DOCTYPE html>
<html lang="ja">
<head>
<script src="../gate.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Check-in Motion — BwU</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --jp:'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;
    --ff:'Figtree', var(--jp);
    --grad-purple:#812DFF;   /* figma brand gradient */
    --grad-orange:#FF6739;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    background:#050505;
    display:flex;align-items:center;justify-content:center;
    font-family:var(--ff);-webkit-font-smoothing:antialiased;color:#fff;
    overflow:hidden;
  }

  /* ============ phone frame ============ */
  #phoneWrap{position:relative;}
  #phone{
    position:relative;width:390px;height:844px;
    background:#101010;border-radius:47px;overflow:hidden;
    box-shadow:0 0 0 10px #1c1c1e,0 0 0 12px #3a3a3c,0 40px 90px rgba(0,0,0,.8);
  }

  /* replay */
  #replay{
    position:fixed;top:20px;right:24px;z-index:99;
    background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);
    border:1px solid rgba(255,255,255,.15);border-radius:20px;
    padding:8px 16px;font-size:13px;font-family:inherit;cursor:pointer;
    backdrop-filter:blur(8px);transition:background .2s;
  }
  #replay:hover{background:rgba(255,255,255,.16);}

  /* on a real phone: no bezel, fill the screen */
  body.mobile #phone{
    border-radius:0;box-shadow:none;
  }
  body.mobile #replay{
    top:calc(env(safe-area-inset-top,0px) + 10px);right:12px;
    padding:6px 12px;font-size:12px;
  }

  .screen{position:absolute;inset:0;}
  [hidden]{display:none !important;}

  /* ============ SCREEN A : ui_video top (HANA) ============ */
  #screenA{z-index:1;background:#101010;}

  /* --- hero --- */
  #hero{position:absolute;left:0;top:0;width:390px;height:391px;z-index:0;overflow:hidden;}
  #hero video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  #hero .fade{position:absolute;left:0;right:0;top:181px;bottom:-1px;
    background:linear-gradient(180deg,rgba(16,16,16,0) 0%,#101010 100%);}
  #herotext{position:absolute;left:0;top:231px;width:390px;height:160px;z-index:1;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:16px;}
  #herotext .hana{font-weight:700;font-size:40px;letter-spacing:-0.8px;line-height:1.05;}
  #herotext .fc{font-weight:400;font-size:16px;letter-spacing:-0.32px;margin-top:4px;}

  /* --- content cards --- */
  #content{position:absolute;left:0;top:0;width:390px;z-index:1;}
  .noti{position:absolute;left:16px;top:391px;width:358px;
    background:rgba(255,255,255,0.08);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border-radius:16px;padding:16px;display:flex;gap:8px;align-items:flex-start;}
  .noti .bell{width:24px;height:24px;border-radius:12px;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;
    background:linear-gradient(154deg,var(--grad-purple) 0%,var(--grad-orange) 100%);}
  .noti .bell img{width:12.17px;height:13.5px;display:block;}
  .noti .body{flex:1 1 0;min-width:0;display:flex;flex-direction:column;gap:4px;justify-content:center;}
  .noti .ttl{font-weight:600;font-size:16px;line-height:22px;color:#fff;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .noti .sub{font-weight:400;font-size:14px;line-height:20px;color:rgba(255,255,255,0.75);
    overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}

  .promo{position:absolute;left:16px;top:485px;width:358px;
    border:1px solid rgba(255,255,255,0.15);border-radius:16px;overflow:hidden;padding:2px;
    background:#141414;}
  .promo .pbg{position:absolute;inset:-20px;background-size:cover;background-position:center;
    filter:blur(16px);transform:scale(1.15);opacity:0.55;}
  .promo .pbg-dark{position:absolute;inset:0;background:rgba(0,0,0,0.6);}
  .promo .photo{position:relative;width:100%;aspect-ratio:354/199;border-radius:14px;overflow:hidden;}
  .promo .photo img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
  .promo .pickup{position:absolute;top:8px;left:8px;z-index:2;
    background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border-radius:24px;padding:2px 8px;font-weight:400;font-size:14px;letter-spacing:-0.28px;color:#fff;}
  .promo .info{position:relative;padding:12px 12px;}
  .promo .info .t{font-weight:600;font-size:16px;line-height:22px;color:#fff;height:44px;overflow:hidden;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
  .promo .info .d{margin-top:4px;font-weight:400;font-size:14px;line-height:20px;color:rgba(255,255,255,0.5);}

  /* --- chrome (status bar + nav buttons + check-in pill) --- */
  #chrome{position:absolute;left:0;top:0;width:390px;height:112px;z-index:5;
    background:linear-gradient(180deg,rgba(0,0,0,0.58) 0%,rgba(0,0,0,0) 100%);
    transition:opacity .3s ease;}
  #chrome .time{position:absolute;left:54px;top:15px;font-weight:600;font-size:17px;color:#fff;
    font-feature-settings:"tnum";}
  #chrome .levels{position:absolute;right:16px;top:19px;display:flex;align-items:center;gap:7px;}
  #chrome .levels img{display:block;}
  #chrome .btn{position:absolute;top:64px;width:40px;height:40px;border-radius:42px;
    background:rgba(0,0,0,0.3);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;}
  #chrome .btn.left{left:12px;}
  #chrome .btn.right{right:12px;}

  /* --- チェックイン可能 pill : rotating gradient border (figma colors) --- */
  @property --a{syntax:'<angle>';initial-value:0deg;inherits:false;}
  #checkinPill{
    position:absolute;left:50%;top:64px;height:40px;border-radius:20px;
    display:flex;align-items:center;justify-content:center;gap:6px;
    padding:0 16px;cursor:pointer;border:none;
    background:transparent;
    color:#fff;font-family:inherit;font-size:14px;font-weight:600;line-height:20px;
    opacity:0;transform:translateX(-50%) translateY(-72px);
  }
  #checkinPill.in{animation:pillDrop .8s cubic-bezier(.16,1,.3,1) forwards;}
  @keyframes pillDrop{
    0%{opacity:0;transform:translateX(-50%) translateY(-72px);}
    60%{opacity:1;}
    100%{opacity:1;transform:translateX(-50%) translateY(0);}
  }
  /* rotating border: figma gradient #812DFF -> #FF6739 */
  #checkinPill::before{
    content:'';position:absolute;inset:-1.5px;border-radius:22px;z-index:0;
    background:conic-gradient(from var(--a),
      var(--grad-purple),var(--grad-orange),var(--grad-purple));
    animation:borderSpin 2.8s linear infinite;
  }
  @keyframes borderSpin{to{--a:360deg;}}
  #checkinPill .inner{
    position:absolute;inset:0;border-radius:20px;background:rgba(0,0,0,.8);
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);z-index:1;
  }
  #checkinPill img,#checkinPill span.lbl{position:relative;z-index:2;}
  #checkinPill img{width:20px;height:20px;padding:0 1.2px;}
  #checkinPill:active{transform:translateX(-50%) scale(.96);}

  /* ===== TABBAR — reusable component (bwu/components/tabbar) ===== */
  :root{
    --tabbar-bg:        rgba(0,0,0,0.65);
    --tabbar-border:    rgba(255,255,255,0.15);
    --tabbar-blur:      16px;
    --tabbar-radius:    42px;
    --tab-inactive:     rgba(255,255,255,0.5);
    --tab-active:       #ffffff;
    --tab-more-bg:      rgba(255,255,255,0.25);
    --tab-more-border:  rgba(255,255,255,0.15);
    --tab-more-blur:    8px;
  }
  .tabbar{
    position:absolute;left:50%;bottom:24px;transform:translateX(-50%);z-index:6;
    height:64px;padding:7px 20px;border-radius:var(--tabbar-radius);
    display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
    transition:opacity .3s ease;
  }
  .tabbar::before{
    content:"";position:absolute;inset:0;z-index:0;border-radius:inherit;
    background:var(--tabbar-bg);border:1px solid var(--tabbar-border);
    backdrop-filter:blur(var(--tabbar-blur));-webkit-backdrop-filter:blur(var(--tabbar-blur));
  }
  .tabbar__row{position:relative;z-index:1;display:flex;gap:12px;align-items:flex-end;justify-content:center;}
  .tab-item{
    width:48px;padding:4px 0 2px;border:0;background:none;cursor:pointer;
    display:flex;flex-direction:column;gap:4px;align-items:center;justify-content:flex-end;
    color:var(--tab-inactive);font-family:var(--ff);
  }
  .tab-item svg{width:24px;height:24px;display:block;fill:currentColor;}
  .tab-item__label{
    font-size:11px;line-height:15px;letter-spacing:0.11px;text-align:center;white-space:nowrap;
    color:currentColor;text-shadow:0 0 4px rgba(0,0,0,0.25);
  }
  .tab-item.active{color:var(--tab-active);}
  .tab-item.is-center{width:48px;height:75px;gap:2px;padding:0 0 2px;}
  .tab-item.is-center .tab-item__icon{
    width:48px;height:48px;border-radius:40px;
    display:flex;align-items:center;justify-content:center;
    background:var(--tab-more-bg);border:1px solid var(--tab-more-border);
    backdrop-filter:blur(var(--tab-more-blur));-webkit-backdrop-filter:blur(var(--tab-more-blur));
  }
  .tab-item.is-center .ic-hana{width:48px;height:48px;}

  /* ============ fill-phase dim (no blur) ============ */
  #dimOverlay{
    position:absolute;inset:0;background:rgba(0,0,0,.72);
    -webkit-backdrop-filter:blur(32px);backdrop-filter:blur(32px);
    opacity:0;transition:opacity .35s ease;
  }
  #dimOverlay.on{opacity:1;}
  #screenA.checking #chrome,
  #screenA.checking .tabbar{opacity:0;pointer-events:none;}

  /* black dip used when switching to the complete screen */
  #fader{
    position:absolute;inset:0;z-index:30;background:#000;
    opacity:0;pointer-events:none;transition:opacity .3s ease;
  }
  #fader.on{opacity:1;}

  /* ============ SCREEN B : pin liquid fill ============ */
  #screenB{z-index:10;pointer-events:none;}
  #pinWrap{
    position:absolute;left:50%;top:317px;width:117px;height:169px;
    transform:translateX(-50%);
    opacity:0;
  }
  #pinWrap.in{animation:pinPop .45s cubic-bezier(.34,1.45,.55,1) forwards;}
  @keyframes pinPop{
    0%{opacity:0;transform:translateX(-50%) scale(.45) translateY(24px);}
    100%{opacity:1;transform:translateX(-50%) scale(1) translateY(0);}
  }
  #pinWrap.done{animation:pinDone .4s cubic-bezier(.4,0,.6,1) forwards;}
  @keyframes pinDone{
    0%{opacity:1;transform:translateX(-50%) scale(1);}
    35%{transform:translateX(-50%) scale(1.1);}
    100%{opacity:0;transform:translateX(-50%) scale(1.26);}
  }
  #pinSvg{
    position:relative;width:117px;height:169px;overflow:visible;display:block;
    transform-origin:50% 50%;
  }

  /* ============ SCREEN C : complete ============ */
  #screenC{z-index:20;background:#101010;opacity:0;}
  #screenC.in{opacity:1;}

  #confettiBg{
    position:absolute;inset:0;
    background:url('assets/confetti_bg.png') center/cover no-repeat;
  }
  #screenC.in #confettiBg{animation:confettiFade 3s ease-out forwards;}
  @keyframes confettiFade{
    0%{opacity:1;transform:scale(1) translateY(0);}
    100%{opacity:0;transform:scale(1.12) translateY(-26px);}
  }
  #confettiPieces{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
  .cpiece{position:absolute;will-change:transform,opacity;}

  #completeCol{
    position:absolute;left:48px;top:50%;transform:translateY(-50%);
    width:295px;display:flex;flex-direction:column;gap:24px;align-items:center;
  }

  /* domino helpers */
  .domino{opacity:0;}
  .domino.in{animation:dominoIn .55s cubic-bezier(.3,1.35,.55,1) forwards;}
  @keyframes dominoIn{
    0%{opacity:0;transform:translateY(26px) scale(.92);}
    100%{opacity:1;transform:translateY(0) scale(1);}
  }
  #ticketCard.domino.in{animation:cardIn .65s cubic-bezier(.3,1.3,.5,1) forwards;}
  @keyframes cardIn{
    0%{opacity:0;transform:translateY(34px) scale(.72);}
    100%{opacity:1;transform:translateY(0) scale(1);}
  }

  /* --- ticket card --- */
  #ticketCard{width:278px;display:flex;flex-direction:column;}
  .ticketTop{
    position:relative;width:278px;height:62px;margin-bottom:-1px;
    border-radius:24px 24px 0 0;overflow:hidden;
  }
  .ticketTop .shape{
    position:absolute;inset:0;width:278px;height:62px;transform:rotate(180deg);
  }
  .ticketTop .stripes{
    position:absolute;inset:0;
    background:repeating-linear-gradient(131deg,
      rgba(0,0,0,.05) 0 7px,transparent 7px 30px);
    -webkit-mask-image:url('assets/ticket_top.svg');
    mask-image:url('assets/ticket_top.svg');
    -webkit-mask-size:100% 100%;mask-size:100% 100%;
    transform:rotate(180deg);
  }
  .ticketTop .row{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    width:230px;height:48px;display:flex;align-items:center;justify-content:space-between;
  }
  .ticketTop .row img{width:56px;height:17px;display:block;}
  .ticketTop .row .date{
    font-size:16px;line-height:20px;letter-spacing:-.8px;color:#393939;
  }
  .ticketBottom{
    position:relative;width:278px;height:149px;
    border-radius:0 0 24px 24px;overflow:hidden;
  }
  .ticketBottom .shape{position:absolute;inset:0;width:278px;height:149px;}
  .ticketBottom .info{
    position:absolute;left:24px;top:20px;width:230px;
    display:flex;flex-direction:column;gap:4px;
  }
  .ticketBottom .evt{font-size:12px;line-height:15px;letter-spacing:-.6px;color:#838383;}
  .ticketBottom .title{
    font-size:20px;line-height:1.3;font-weight:700;letter-spacing:-.6px;color:#191919;
  }
  .ticketBottom .stamp{
    position:absolute;right:0;bottom:0;width:126px;height:126px;
    mix-blend-mode:darken;opacity:.5;object-fit:cover;
  }

  #completeTexts{display:flex;flex-direction:column;gap:8px;text-align:center;width:100%;}
  #completeTitle{font-size:22px;line-height:28px;font-weight:700;color:#fff;}
  #completeSub{font-size:12px;line-height:20px;letter-spacing:-.4px;color:#9F9F9F;}

  #historyBtn{
    position:absolute;left:16px;bottom:80px;width:358px;
    display:flex;align-items:center;justify-content:center;gap:4px;
    padding:14px 24px;border-radius:999px;border:none;cursor:pointer;
    background:#fff;backdrop-filter:blur(6px);
    font-family:inherit;font-size:14px;font-weight:600;line-height:20px;color:#000;
  }
  #historyBtn:active{transform:scale(.97);}
</style>
</head>
<body>

<button id="replay" type="button">↺ Replay</button>

<div id="phoneWrap">
  <div id="phone">

    <!-- ============ SCREEN A : ui_video top ============ -->
    <div id="screenA" class="screen">

      <!-- HERO video + gradient -->
      <div id="hero">
        <video id="vid" muted playsinline autoplay loop preload="auto" src="assets/top/hero.mp4"></video>
        <div class="fade"></div>
      </div>
      <div id="herotext">
        <div class="hana">HANA</div>
        <div class="fc">HONEYs</div>
      </div>

      <!-- CONTENT -->
      <div id="content">
        <div class="noti">
          <div class="bell"><img src="assets/top/ic_bell.svg" alt=""></div>
          <div class="body">
            <div class="ttl">HANA 初の全国ホールツアー開催決定</div>
            <div class="sub">HANA Official Fan Club会員先行スタート！</div>
          </div>
        </div>

        <div class="promo">
          <div class="pbg" style="background-image:url('assets/top/btb.png')"></div>
          <div class="pbg-dark"></div>
          <div class="photo"><img src="assets/top/btb.png" alt=""></div>
          <div class="info">
            <div class="t">《追加公演Fan Club最終先行》『HANA 1st TOUR 2026 &ldquo;Born to Bloom&rdquo;』 追加公演のFan Club会員最終先行受付スタート</div>
            <div class="d">2026.06.12</div>
          </div>
        </div>
      </div>

      <!-- CHROME -->
      <div id="chrome">
        <div class="time">9:41</div>
        <div class="levels">
          <img src="assets/top/cellular.svg" style="width:19.2px;height:12.2px" alt="">
          <img src="assets/top/wifi.svg" style="width:17.1px;height:12.3px" alt="">
          <img src="assets/top/battery.svg" style="width:27.3px;height:13px" alt="">
        </div>
        <div class="btn left"><img src="assets/top/ic_back.svg" style="width:9px;height:16px" alt=""></div>
        <div class="btn right"><img src="assets/top/ic_search.svg" style="width:20px;height:20px" alt=""></div>

        <!-- チェックイン可能 pill -->
        <button id="checkinPill" type="button">
          <span class="inner"></span>
          <img src="assets/icon_pin_small.svg" alt="">
          <span class="lbl">チェックイン可能</span>
        </button>
      </div>

      <!-- TABBAR — reusable component (bwu/components/tabbar), Home active, center = More -->
      <nav class="tabbar" id="tabbar">
        <div class="tabbar__row">
          <button class="tab-item active" data-tab="0">
            <span class="tab-item__icon">
              <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M23.121 9.069L15.536 1.483C14.5972 0.546989 13.3257 0.0213736 12 0.0213736C10.6743 0.0213736 9.40276 0.546989 8.464 1.483L0.879 9.069C0.599426 9.34678 0.37777 9.6773 0.226883 10.0414C0.0759953 10.4055 -0.00112232 10.7959 1.60589e-07 11.19V21.007C1.60589e-07 21.8026 0.316071 22.5657 0.87868 23.1283C1.44129 23.6909 2.20435 24.007 3 24.007H21C21.7957 24.007 22.5587 23.6909 23.1213 23.1283C23.6839 22.5657 24 21.8026 24 21.007V11.19C24.0011 10.7959 23.924 10.4055 23.7731 10.0414C23.6222 9.6773 23.4006 9.34678 23.121 9.069ZM15 22.007H9V18.073C9 17.2774 9.31607 16.5143 9.87868 15.9517C10.4413 15.3891 11.2044 15.073 12 15.073C12.7957 15.073 13.5587 15.3891 14.1213 15.9517C14.6839 16.5143 15 17.2774 15 18.073V22.007ZM22 21.007C22 21.2722 21.8946 21.5266 21.7071 21.7141C21.5196 21.9016 21.2652 22.007 21 22.007H17V18.073C17 16.7469 16.4732 15.4751 15.5355 14.5375C14.5979 13.5998 13.3261 13.073 12 13.073C10.6739 13.073 9.40215 13.5998 8.46447 14.5375C7.52679 15.4751 7 16.7469 7 18.073V22.007H3C2.73478 22.007 2.48043 21.9016 2.29289 21.7141C2.10536 21.5266 2 21.2722 2 21.007V11.19C2.00093 10.925 2.10619 10.671 2.293 10.483L9.878 2.9C10.4417 2.33893 11.2047 2.02394 12 2.02394C12.7953 2.02394 13.5583 2.33893 14.122 2.9L21.707 10.486C21.8931 10.6732 21.9983 10.926 22 11.19V21.007Z"/></svg>
            </span>
            <span class="tab-item__label">Home</span>
          </button>

          <!-- artwork -->
          <g clip-path="url(#artClip)">
            <image href="assets/pin_artwork.png" x="8.5" y="8.5" width="100" height="100"/>
          </g>
        </svg>
      </div>
    </div>

    <!-- ============ SCREEN C : complete ============ -->
    <div id="screenC" class="screen" hidden>
      <div id="confettiBg"></div>
      <div id="confettiPieces"></div>

      <div id="completeCol">
        <div id="ticketCard" class="domino">
          <div class="ticketTop">
            <img class="shape" src="assets/ticket_top.svg" alt="">
            <div class="stripes"></div>
            <div class="row">
              <img src="assets/ticket_logo.svg" alt="BwU">
              <div class="date">2026.08.05</div>
            </div>
          </div>
          <div class="ticketBottom">
            <img class="shape" src="assets/ticket_bottom.svg" alt="">
            <img class="stamp" src="assets/ticket_stamp.png" alt="">
            <div class="info">
              <div class="evt">EVENT</div>
              <div class="title">B with U Release Party 2026 @Tokyo</div>
            </div>
          </div>
        </div>

        <div id="completeTexts">
          <div id="completeTitle" class="domino">チェックインが完了しました</div>
          <div id="completeSub" class="domino">チェックインページで確認しましょう</div>
        </div>
      </div>

      <button id="historyBtn" class="domino" type="button">チェックイン履歴へ</button>
    </div>

    <!-- black dip for screen switch -->
    <div id="fader"></div>

  </div>
</div>

<script>
(() => {
  const $ = s => document.querySelector(s);
  const screenA = $('#screenA'), screenB = $('#screenB'), screenC = $('#screenC');
  const pill = $('#checkinPill'), pinWrap = $('#pinWrap'), pinSvg = $('#pinSvg');
  const dim = $('#dimOverlay'), fader = $('#fader');
  const waveFront = $('#waveFront'), waveBack = $('#waveBack');
  const confettiPieces = $('#confettiPieces');

  /* ---------- fit phone to viewport ---------- */
  function fit(){
    const mobile = innerWidth <= 500;
    document.body.classList.toggle('mobile', mobile);
    const s = mobile
      ? Math.min(innerWidth / 390, innerHeight / 844)   // fullscreen, no bezel
      : Math.min((innerHeight - 48) / 868, (innerWidth - 48) / 414, 1.15);
    $('#phoneWrap').style.transform = `scale(${s})`;
  }
  addEventListener('resize', fit); fit();

  /* ---------- phase 1 : pill entrance ---------- */
  let started = false;
  function intro(){ setTimeout(() => pill.classList.add('in'), 450); }

  /* ---------- phase 2 : liquid pin (quick) ---------- */
  const PIN_W = 117, PIN_BOTTOM = 172, LEVEL_TOP = -10, LEVEL_BOTTOM = 176;
  const FILL_MS = 1500, SETTLE_MS = 350;
  const PIN_GROW = 0.20;             // pin grows to 120% as it fills
  let rafId = null;

  const easeInOut = t => t < .5 ? 4*t*t*t : 1 - Math.pow(-2*t + 2, 3) / 2;

  function wavePath(level, phase, amp, lambda){
    let d = `M0 ${PIN_BOTTOM} L0 ${level.toFixed(2)}`;
    for (let x = 0; x <= PIN_W; x += 3){
      const y = level + Math.sin((x / lambda) * Math.PI * 2 + phase) * amp;
      d += ` L${x} ${y.toFixed(2)}`;
    }
    return d + ` L${PIN_W} ${PIN_BOTTOM} Z`;
  }

  function startFill(){
    const t0 = performance.now();
    function frame(now){
      const el = now - t0;
      const p = Math.min(el / FILL_MS, 1);
      const e = easeInOut(p);
      const level = LEVEL_BOTTOM + (LEVEL_TOP - LEVEL_BOTTOM) * e;
      const settle = el > FILL_MS ? Math.max(0, 1 - (el - FILL_MS) / SETTLE_MS) : 1;
      const amp = (3 + 2.6 * Math.sin(p * Math.PI)) * settle;
      const ph = now / 200;
      waveFront.setAttribute('d', wavePath(level, ph, amp, 68));
      waveBack .setAttribute('d', wavePath(level + 2.5, -ph * 1.25 + 1.7, amp * 1.35, 92));
      pinSvg.style.transform = `scale(${(1 + PIN_GROW * e).toFixed(4)})`;

      if (el < FILL_MS + SETTLE_MS){ rafId = requestAnimationFrame(frame); }
      else { setTimeout(finishPin, 120); }
    }
    rafId = requestAnimationFrame(frame);
  }

  function finishPin(){
    pinWrap.classList.add('done');
    fader.style.display = '';
    setTimeout(() => fader.classList.add('on'), 150);   // dip to black
    setTimeout(showComplete, 480);                       // swap under black
  }

  function startCheckin(){
    if (started) return; started = true;
    screenA.classList.add('checking');
    screenB.hidden = false;
    requestAnimationFrame(() => dim.classList.add('on'));
    setTimeout(() => {
      pinWrap.classList.add('in');
      setTimeout(startFill, 300);
    }, 150);
  }

  /* ---------- phase 3 : complete ---------- */
  function spawnConfetti(){
    const imgs = ['confetti_p1','confetti_p2','confetti_p3','confetti_p4'];
    for (let i = 0; i < 26; i++){
      const el = document.createElement('img');
      el.className = 'cpiece';
      el.src = `assets/${imgs[i % imgs.length]}.png`;
      const size = 14 + Math.random() * 30;
      el.style.width = size + 'px';
      el.style.left = (Math.random() * 390 - 15) + 'px';
      el.style.top = (-60 - Math.random() * 120) + 'px';
      confettiPieces.appendChild(el);
      const fall = 400 + Math.random() * 480;
      const drift = (Math.random() - .5) * 120;
      const rot0 = Math.random() * 360, rot1 = rot0 + (Math.random() - .5) * 720;
      el.animate([
        { transform:`translate(0,0) rotate(${rot0}deg)`, opacity:1 },
        { transform:`translate(${drift}px,${fall}px) rotate(${rot1}deg)`, opacity:0 }
      ], {
        duration: 2100 + Math.random() * 800,
        delay: Math.random() * 250,
        easing: 'cubic-bezier(.25,.4,.6,1)',
        fill: 'forwards'
      });
    }
    setTimeout(() => confettiPieces.replaceChildren(), 3400);
  }

  function showComplete(){
    // screens swap while the fader is fully black
    screenB.hidden = true;
    dim.classList.remove('on');
    screenA.classList.remove('checking');
    // hide the hero video: its composited layer can bleed through the
    // opaque complete screen (Chromium overlay artifact)
    const vid = $('#vid');
    vid.pause(); vid.style.visibility = 'hidden';
    screenC.hidden = false;
    screenC.classList.add('in');
    requestAnimationFrame(() => requestAnimationFrame(() => {
      fader.classList.remove('on');   // reveal
      // drop the fader layer once revealed (avoids stale-layer artifacts)
      setTimeout(() => { fader.style.display = 'none'; }, 350);
      spawnConfetti();
      // domino : card -> title -> sub -> button
      const steps = [['#ticketCard',150], ['#completeTitle',410], ['#completeSub',550], ['#historyBtn',710]];
      steps.forEach(([sel, t]) => setTimeout(() => $(sel).classList.add('in'), t));
    }));
  }

  /* ---------- wiring ---------- */
  pill.addEventListener('click', startCheckin);
  $('#historyBtn').addEventListener('click', reset);
  $('#replay').addEventListener('click', reset);

  function reset(){
    if (rafId) cancelAnimationFrame(rafId);
    started = false;
    screenA.classList.remove('checking');
    dim.classList.remove('on');
    fader.classList.remove('on');
    fader.style.display = 'none';
    screenB.hidden = true;
    screenC.hidden = true;
    screenC.classList.remove('in');
    pinWrap.classList.remove('in','done');
    pinSvg.style.transform = '';
    waveFront.removeAttribute('d'); waveBack.removeAttribute('d');
    pill.classList.remove('in');
    void pill.offsetWidth; // restart entrance animation
    document.querySelectorAll('.domino').forEach(el => el.classList.remove('in'));
    confettiPieces.replaceChildren();
    const vid = $('#vid');
    vid.style.visibility = '';
    if (vid.paused) vid.play().catch(() => {});
    intro();
  }

  intro();
})();
</script>
</body>
</html>
